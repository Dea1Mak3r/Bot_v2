name: monitoring_system
version: '3.8'
services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file: .env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
    networks:
      - appnet
    ports:
      - "5432:5432"

  api:
    container_name: api
    build:
      context: .
      dockerfile: ./API/Dockerfile
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      - TZ=Europe/Moscow
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  bot:
    container_name: tg_bot
    build:
      context: .
      dockerfile: ./telegram_bot_stand_info/Dockerfile
    env_file: .env
    environment:
      - TZ=Europe/Moscow
    depends_on:
      api:
        condition: service_started
    networks:
      - appnet

  web_interface:
    container_name: web_interface
    build:
      context: .
      dockerfile: ./web_interface/Dockerfile
    environment:
      - TZ=Europe/Moscow
    ports:
      - "8502:8502"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    depends_on:
      api:
        condition: service_started
    networks:
      - appnet
volumes:
  db_data:

networks:
  appnet:

